<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ギャンブル王 - トレード</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/trade.css">
</head>
<body>
    <button class="btn-back-small" onclick="window.location.href='home.html'">戻る</button>

    <div class="trade-container">
        <h2>📈 運用トレード</h2>
        <div id="setup">
            <select id="itemSelect"></select>
            <input type="number" id="itemCount" min="1" value="1">
            <button class="btn btn-lobby" onclick="initTrade()">トレード開始</button>
        </div>
        
        <div id="tradeArea" style="display:none;">
            <div class="val-display" id="currentVal">$0.00</div>
            <canvas id="chart"></canvas>
            <p>残り時間: <span id="time">25.0</span>秒</p>
            <div class="controls">
                <button id="buyBtn" onclick="tradeAction('buy')" style="background: #ef4444; color: white;" disabled>購入</button>
                <button id="sellBtn" onclick="tradeAction('sell')" style="background: #38bdf8; color: white;">売却</button>
            </div>
            <button class="btn-stop" onclick="finishTrade()">中止して確定する</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        let investItems = JSON.parse(localStorage.getItem('gk_invest_items')) || {};
        const prices = { brick: 10000, egg: 100000, goldLeaf: 500000000, rupee: 200000000000, goldBar: 100000000000000 };
        
        let activeItem = null, activeCount = 0, currentPrice = 0, basePrice = 0, priceHistory = [];
        let tradeEvents = [];
        let interval;

        const sel = document.getElementById('itemSelect');
        Object.keys(investItems).forEach(key => {
            if(investItems[key] > 0) sel.innerHTML += `<option value="${key}">${key} (所持:${investItems[key]})</option>`;
        });

        function initTrade() {
            activeItem = sel.value;
            activeCount = parseInt(document.getElementById('itemCount').value);
            if(!activeItem || activeCount > investItems[activeItem]) return alert("無効な選択です");
            
            investItems[activeItem] -= activeCount;
            localStorage.setItem('gk_invest_items', JSON.stringify(investItems));
            
            currentPrice = prices[activeItem];
            basePrice = currentPrice;
            priceHistory = [currentPrice];
            tradeEvents = [];
            document.getElementById('setup').style.display = 'none';
            document.getElementById('tradeArea').style.display = 'block';
            runTradeLoop();
        }

        function runTradeLoop() {
            let timeLeft = 25.0;
            interval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('time').innerText = timeLeft.toFixed(1);

                if (timeLeft % 5 < 0.1) {
                    if (Math.random() < 0.1) alert(Math.random() < 0.6 ? "🚀 ＋イベント発生！" : "⚠️ －イベント発生！");
                }

                let change = (Math.random() * 2.0) - 1.2;
                currentPrice *= (1 + change / 10);
                priceHistory.push(currentPrice);
                updateDisplay();

                if (timeLeft <= 0) { finishTrade(); }
            }, 100);
        }

        function updateDisplay() {
            const el = document.getElementById('currentVal');
            let diff = (currentPrice - basePrice) * activeCount;
            el.innerText = (diff >= 0 ? "+" : "") + diff.toLocaleString('en-US', {minimumFractionDigits: 2});
            el.className = diff >= 0 ? "val-display red" : "val-display blue";
            drawChart();
        }

        function tradeAction(type) {
            tradeEvents.push({ index: priceHistory.length - 1, type: type });
            basePrice = currentPrice;
            document.getElementById('buyBtn').disabled = (type === 'buy');
            document.getElementById('sellBtn').disabled = (type === 'sell');
        }

        function finishTrade() {
            clearInterval(interval);
            let profit = (currentPrice - prices[activeItem]) * activeCount;
            let currentMoney = parseFloat(localStorage.getItem('gk_money')) || 0.0;
            let totalAssets = parseFloat(localStorage.getItem('gk_total_assets')) || 0.0;
            
            currentMoney += profit;
            totalAssets += Math.max(0, profit);
            localStorage.setItem('gk_money', currentMoney);
            localStorage.setItem('gk_total_assets', totalAssets);
            
            alert("トレード終了！利益: " + profit.toLocaleString('en-US', {minimumFractionDigits: 2}));
            window.location.href = 'home.html';
        }

        function drawChart() {
            ctx.clearRect(0, 0, 400, 200);
            let history = priceHistory.slice(-60);
            let minP = Math.min(...history) * 0.95;
            let maxP = Math.max(...history) * 1.05;
            let range = (maxP - minP) || 1;

            ctx.beginPath();
            history.forEach((p, i) => {
                let x = (i / 60) * 370;
                let y = 180 - ((p - minP) / range) * 160;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            let lastX = ((history.length - 1) / 60) * 370;
            let lastY = 180 - ((history[history.length-1] - minP) / range) * 160;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
            ctx.fill();

            tradeEvents.forEach(ev => {
                let idx = ev.index - (priceHistory.length - 60);
                if(idx >= 0) {
                    let x = (idx / 60) * 370;
                    let y = 180 - ((priceHistory[ev.index] - minP) / range) * 160;
                    ctx.strokeStyle = ev.type === 'buy' ? 'red' : 'blue';
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
        }
    </script>
</body>
</html>
