<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ギャンブル王 - トレード</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/trade.css">
</head>
<body>
    <div class="trade-container">
        <h2>📈 運用トレード</h2>
        <div id="setup">
            <select id="itemSelect" onchange="updatePriceDisplay()"></select>
            <input type="number" id="itemCount" min="1" value="1" oninput="updatePriceDisplay()">
            <div id="priceInfo" style="margin: 15px 0; color: #ffd700;">
                <div id="unitPriceDisplay">単価: $0</div>
                <div id="totalPriceDisplay" style="font-size: 1.2rem; font-weight: bold;">総額: $0</div>
            </div>
            <button id="startBtn" class="btn btn-lobby" onclick="initTrade()">トレード開始</button>
        </div>
        
        <div id="tradeArea" style="display:none;">
            <div class="val-display" id="currentVal">$0.00</div>
            <canvas id="chart" width="400" height="200"></canvas>
            <p>残り時間: <span id="time">25.0</span>秒</p>
            <div class="controls">
                <button id="buyBtn" onclick="tradeAction('buy')" style="background: #ef4444; color: white;">購入</button>
                <button id="sellBtn" onclick="tradeAction('sell')" style="background: #38bdf8; color: white;">売却</button>
            </div>
            <button class="btn-stop" onclick="finishTrade()">中止して確定する</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        let investItems = JSON.parse(localStorage.getItem('gk_invest_items')) || {};
        const prices = { brick: 10000, egg: 100000, goldLeaf: 500000000, rupee: 200000000000, goldBar: 100000000000000 };
        
        let activeItem = null, activeCount = 0, currentVal = 1.0, baseTotal = 0, priceHistory = [];
        let isEventMode = false;
        let interval;

        const sel = document.getElementById('itemSelect');
        const startBtn = document.getElementById('startBtn');

        // 初期化：所持アイテムチェック
        let hasAnyItem = false;
        Object.keys(prices).forEach(key => {
            const count = investItems[key] || 0;
            if (count > 0) {
                hasAnyItem = true;
                sel.innerHTML += `<option value="${key}">${key} (所持:${count})</option>`;
            }
        });

        if (!hasAnyItem) {
            startBtn.disabled = true;
            startBtn.innerText = "アイテムを購入してください";
        } else {
            updatePriceDisplay();
        }

        function updatePriceDisplay() {
            const item = sel.value;
            const count = parseInt(document.getElementById('itemCount').value) || 0;
            const total = (prices[item] || 0) * count;
            document.getElementById('totalPriceDisplay').innerText = "総額: $" + total.toLocaleString();
        }

        function initTrade() {
            activeItem = sel.value;
            activeCount = parseInt(document.getElementById('itemCount').value) || 0;
            if (activeCount > (investItems[activeItem] || 0)) { alert("所持数が足りません"); return; }
            
            investItems[activeItem] -= activeCount;
            localStorage.setItem('gk_invest_items', JSON.stringify(investItems));
            
            baseTotal = prices[activeItem] * activeCount;
            currentVal = 1.0;
            priceHistory = [1.0];
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('tradeArea').style.display = 'block';
            runTradeLoop();
        }

        function runTradeLoop() {
            let timeLeft = 25.0;
            let tick = 0;

            interval = setInterval(() => {
                timeLeft -= 0.1;
                tick++;
                document.getElementById('time').innerText = timeLeft.toFixed(1);

                // 5秒毎(50tick)にイベント抽選
                if (tick % 50 === 0) {
                    isEventMode = (Math.random() < 0.2);
                }

                // 変動率の計算
                let change;
                if (isEventMode) {
                    // イベント時：大幅変動
                    change = Math.random() < 0.5 ? (Math.random() * 3.0 + 2.0) : -(Math.random() * 6.7 + 2.0);
                } else {
                    // 通常時：150% 〜 -140%
                    change = (Math.random() * 2.9 - 1.4);
                }

                currentVal *= (1 + change);
                priceHistory.push(currentVal);
                updateDisplay();

                if (timeLeft <= 0) { clearInterval(interval); finishTrade(); }
            }, 100);
        }

        function updateDisplay() {
            const el = document.getElementById('currentVal');
            let diff = (currentVal - 1.0) * baseTotal;
            el.innerText = (diff >= 0 ? "+" : "") + diff.toLocaleString('en-US', {minimumFractionDigits: 0});
            el.className = diff >= 0 ? "val-display red" : "val-display blue";
            drawChart();
        }

        function finishTrade() {
            clearInterval(interval);
            let finalProfit = (currentVal - 1.0) * baseTotal;
            let currentMoney = parseFloat(localStorage.getItem('gk_money')) || 0.0;
            currentMoney += finalProfit;
            localStorage.setItem('gk_money', currentMoney);
            alert("トレード終了！利益: " + finalProfit.toLocaleString('en-US', {minimumFractionDigits: 0}));
            window.location.href = 'home.html';
        }

        function drawChart() {
            ctx.clearRect(0, 0, 400, 200);
            let history = priceHistory.slice(-60);
            let minP = Math.min(...history, 0.5) * 0.9;
            let maxP = Math.max(...history, 1.5) * 1.1;
            let range = (maxP - minP) || 1;
            ctx.beginPath();
            history.forEach((p, i) => {
                let x = (i / 60) * 370;
                let y = 180 - ((p - minP) / range) * 160;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.strokeStyle = '#fff';
            ctx.stroke();
        }
    </script>
</body>
</html>
